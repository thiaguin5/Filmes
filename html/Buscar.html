<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSearch</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:32px;
}

.search-box{
    display:flex;
    gap:10px;
}

.search-box input{
    padding:10px;
    width:280px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

.search-box button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.search-box button:hover{
    background:#333;
}

main{
    padding:40px;
}

h2{
    margin-bottom:20px;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:#1d1d1d;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h3{
    margin-bottom:10px;
}

.info p{
    color:#ccc;
    font-size:14px;
    margin-bottom:10px;
}

.nota{
    color:gold;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
<img src="https://picsum.photos/300/450?random=6">
<div class="info">
<h3>Matrix</h3>
<p>Ficção Científica</p>
<div class="nota">⭐ 8.6</div>


</header>

<main>

</div>
</div>

</div>

</main>

</body>
</html>
